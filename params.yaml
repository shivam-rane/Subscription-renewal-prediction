external_data_config:
  external_data_csv: data/external/subscription_accounts.csv

raw_data_config:
  raw_data_csv: data/raw/subscription_renewal_raw.csv
  source_columns:
    - monthly_usage_hours
    - login_frequency
    - last_login_days
    - support_tickets
    - payment_failures
    - subscription_plan
    - renewed
  input_features:
    - monthly_usage_hours
    - login_frequency
    - last_login_days
    - support_tickets
    - payment_failures
    - subscription_plan
  target: renewed
  positive_class: 1
  train_test_split_ratio: 0.2
  random_state: 111

feature_engineering:
  plan_scores:
    starter: 0.7
    growth: 1.0
    business: 1.3
    enterprise: 1.6
  inactivity_risk_weight: 0.12
  payment_failure_risk_weight: 1.75
  support_ticket_risk_weight: 0.55
  engagement_relief_weight: 0.85
  model_features:
    - monthly_usage_hours
    - login_frequency
    - last_login_days
    - support_tickets
    - payment_failures
    - plan_value_index
    - engagement_score
    - activity_ratio
    - support_pressure
    - payment_reliability
    - usage_momentum
    - risk_score

processed_data_config:
  train_data_csv: data/processed/renewal_train.csv
  test_data_csv: data/processed/renewal_test.csv

training:
  model_name: subscription_renewal_gradient_boosting
  artifact_path: models/subscription_renewal_model.joblib
  metrics_path: reports/renewal_model_metrics.json
  best_params_path: reports/renewal_best_params.json
  n_trials: 25
  cv_folds: 3
  n_jobs: 1
  scoring: roc_auc
  prediction_threshold: 0.5

gradient_boosting:
  n_estimators: [80, 220]
  learning_rate: [0.03, 0.25]
  max_depth: [2, 5]
  min_samples_split: [2, 18]
  min_samples_leaf: [1, 8]
  subsample: [0.7, 1.0]
  max_features: ["sqrt", "log2", null]

model_dir: webapp/model_webapp_dir/subscription_renewal_model.joblib
model_webapp_dir: webapp/model_webapp_dir/subscription_renewal_model.joblib

drift_monitoring:
  reference_data_csv: data/processed/renewal_train.csv
  current_data_csv: data/processed/renewal_test.csv
  report_html: reports/renewal_drift_report.html
  summary_json: reports/renewal_drift_report.json

api:
  host: 0.0.0.0
  port: 8000

shap:
  top_k: 5
